clusters:
  # Logical name referenced by bridges[].from.cluster / bridges[].to.cluster.
  cluster_a:
    # Required: Kafka bootstrap brokers for this cluster.
    brokers:
      - '127.0.0.1:9092'

    # Optional: create bridge from/to topics on this cluster at startup (default false).
    # auto_create_topics: true

    # Optional TLS block. Omit to use defaults (tls.enabled=false).
    # tls:
    #   enabled: true
    #   # Optional: CA bundle to validate broker certificates.
    #   ca_file: "/path/to/ca.pem"
    #   # Optional: client certificate for mutual TLS (must be set with key_file).
    #   cert_file: "/path/to/client.pem"
    #   # Optional: private key for mutual TLS (must be set with cert_file).
    #   key_file: "/path/to/client-key.pem"

    # Optional SASL block. Omit to use defaults (mechanism=none).
    # sasl:
    #   mechanism: "scram-sha-256" # none | plain | scram-sha-256 | scram-sha-512
    #   # Required for plain/scram mechanisms:
    #   username: "user"
    #   password: "secret"

    # Optional shared client tuning (applies to both producer and consumer clients).
    # client:
    #   # Optional client id sent to Kafka.
    #   client_id: "bifrost-cluster-a"
    #   # Optional TCP dial timeout (Go duration format).
    #   dial_timeout: "15s"
    #   # Optional overhead added to request deadlines (Go duration format).
    #   request_timeout_overhead: "10s"
    #   # Optional max bytes written in a single broker write.
    #   # Must be >= producer.batch_max_bytes when both are set.
    #   broker_max_write_bytes: 16777216
    #   # Optional max bytes read in a single broker read.
    #   # Must be >= consumer.fetch_max_bytes when both are set.
    #   broker_max_read_bytes: 52428800

    # Optional consumer tuning for from-side bridge clients.
    # consumer:
    #   # Optional total fetch bytes cap.
    #   # Must be >= fetch_max_partition_bytes when both are set.
    #   fetch_max_bytes: 52428800
    #   # Optional per-partition fetch bytes cap.
    #   fetch_max_partition_bytes: 10485760
    #   # Optional max broker wait time per fetch request (Go duration).
    #   fetch_max_wait: "500ms"
    #   # Optional consumer group session timeout (Go duration).
    #   session_timeout: "45s"
    #   # Optional heartbeat interval (Go duration). Must be < session_timeout.
    #   heartbeat_interval: "3s"
    #   # Optional rebalance timeout (Go duration). Must be >= session_timeout.
    #   rebalance_timeout: "60s"
    #   # Optional isolation level: read_uncommitted (default) or read_committed.
    #   isolation_level: "read_uncommitted"
    #   # Optional retry policy for source offset commits after a successful produce.
    #   # Retries continue in-place until success or shutdown/cancellation.
    #   # Defaults when omitted: min_backoff=1s, max_backoff=30s, jitter=250ms.
    #   commit_retry:
    #     min_backoff: "1s"
    #     max_backoff: "30s"
    #     jitter: "250ms"

    # Optional producer tuning for to-side bridge clients.
    # producer:
    #   # Optional acks mode: all (default), leader, none.
    #   required_acks: "all"
    #   # Optional max batch size before compression.
    #   batch_max_bytes: 1048576
    #   # Optional compression: snappy, zstd, lz4, gzip, none.
    #   batch_compression: "snappy"
    #   # Optional producer linger duration. Good high-throughput default is 5ms.
    #   linger: "5ms"
    #   # Optional produce request timeout.
    #   produce_request_timeout: "30s"
    #   # Optional: disable idempotent writes.
    #   disable_idempotent_write: false
    #   # Optional retry policy for destination produce failures.
    #   # Retries continue in-place until success or shutdown/cancellation.
    #   # Defaults when omitted: min_backoff=1s, max_backoff=30s, jitter=250ms.
    #   retry:
    #     min_backoff: "1s"
    #     max_backoff: "30s"
    #     jitter: "250ms"

  cluster_b:
    brokers:
      - '127.0.0.1:9094'
    # TLS and SASL are omitted here; defaults are tls.enabled=false and sasl.mechanism=none.

bridges:
  # One directional relay route from cluster_a/incoming to cluster_b/outgoing.
  - name: 'a-to-b'
    from:
      # Required source cluster key (must exist under clusters).
      cluster: 'cluster_a'
      # Required source topic.
      topic: 'incoming'
    to:
      # Required destination cluster key (must exist under clusters).
      cluster: 'cluster_b'
      # Required destination topic.
      topic: 'outgoing'
    # Optional: relay goroutines for this bridge. Omit or set 0 for automatic sizing from the
    # from.topic partition count (after topic ensure), with host-based caps and fair-sharing across
    # bridges. Set a positive integer to fix the replica count explicitly.
    # replicas: 4
    # Optional: maximum records to relay at once from one source topic-partition. Omit or set 1
    # to disable batching. Produce and commit still happen in order per source partition.
    # batch_size: 1
    # Optional: max concurrently produced batches per replica.
    # Omit/0 uses elastic default (8).
    # max_in_flight_batches: 8
    # Optional: commit acknowledged offsets at this interval (Go duration).
    # Omit/0 uses elastic default (200ms).
    # commit_interval: "200ms"
    # Optional: commit acknowledged offsets when this many records are pending.
    # Omit/0 uses elastic default (1000).
    # commit_max_records: 1000
    # Optional: force all produced records for this bridge onto one destination partition. When
    # omitted, bifrost preserves the source partition number on each record. If set, the
    # destination topic must contain that partition index.
    # override_partition: 0
    # Optional: replace the Kafka key on every produced record for this bridge with a fixed string.
    # override_key: 'static-key'
    # Optional consumer group. Defaults to "bifrost-<sanitized bridge name>" when omitted.
    # consumer_group: "bifrost-a-to-b"
    # Optional string Kafka headers added to every produced record (after bifrost.source.*, before
    # headers from the source message). Keys cannot use the bifrost.* prefix (reserved).
    # extra_headers:
    #   env: 'prod'
    #   my_trace: 'abc'

metrics:
  # Enable/disable Prometheus metrics endpoint and collectors.
  enabled: true
  # Prometheus listen address for /metrics endpoint.
  listen_addr: ':9090'
  # Optional constant labels attached to all emitted metrics.
  extra_labels:
    service: 'bifrost'
    env: 'dev'
  groups:
    golang: true
    process: true
    kafka: true
    tls: true
    tcp: true

logging:
  # Severity threshold: trace, debug, info, warn, error, fatal.
  level: 'info'
  # Output format: json (default) or logfmt.
  format: 'json'
  # Output stream: stdout or stderr.
  stream: 'stdout'
  # Optional fields injected into every log line.
  extra_fields:
    uls_version: '1.0'
    service: 'bifrost'
    env: 'local'
  # How often each bridge logs info-level "bridge periodic stats" (messages_delta and errors_delta
  # since the previous log, plus period_seconds). Go duration syntax (e.g. 30s, 5m). Default 5m.
  # Set to "0" or "0s" to disable.
  periodic_stats_interval: '5m'
