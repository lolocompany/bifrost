name: Go Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run lint gate
        run: make lint

      - name: Run unit tests
        run: make test-unit

      - name: Run race tests
        run: make test-race
