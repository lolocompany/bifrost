name: Codequality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  codequality-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run codequality pipeline and gates
        run: |
          python3 scripts/codequality_pipeline.py --output-prefix ci-scorecard --enforce

      - name: Upload codequality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codequality-reports
          path: |
            reports/codequality/ci-scorecard.json
            reports/codequality/ci-scorecard.md
            reports/codequality/raw/*
